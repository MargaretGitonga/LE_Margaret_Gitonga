<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leverage Experts E.A</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Arial, Helvetica, sans-serif; }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0b1f5b;
    }

    .card{
      width:100%;
      max-width:400px;
      text-align:center;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      padding:30px;
      border-radius:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      overflow:hidden;
      position:relative;
    }

    h1{
      color:#ffffff;
      margin-bottom:6px;
      font-size:26px;
      font-weight:700;
      letter-spacing:0.3px;
    }

    .subtitle{
      color:rgba(255,255,255,0.55);
      font-size:13px;
      margin-bottom:22px;
    }

    .qr-box{
      background:#fff;
      padding:14px;
      border-radius:25px;
      display:inline-block;
      box-shadow:0 4px 20px rgba(0,0,0,0.25);
      margin-bottom:12px;
    }

    .qr-box img{
      width:200px;
      height:200px;
      object-fit:contain;
    }

    .qr-box a{
  display:block;
}

    .tap-text{
      color:rgba(255,255,255,0.7);
      margin-top:15px;
      font-size:14px;
      letter-spacing:1px;
    }

    .whatsapp-btn{
      display:inline-block;
      margin-top:25px;
      background:#25D366;
      color:white;
      text-decoration:none;
      padding:15px 35px;
      border-radius:50px;
      font-weight:bold;
      font-size:14px;
      transition:0.3s;
      box-shadow:0 4px 15px rgba(37,211,102,0.35);
    }

    .whatsapp-btn:hover{
      background:#1ebe5d;
      transform:translateY(-2px);
    }

    .icons{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:30px;
    }

    .icon{
      width:55px;
      height:55px;
      background:rgba(255,255,255,0.2);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      color:white;
      text-decoration:none;
      transition:0.2s;
    }

    .icon:hover{
      background:rgba(255,255,255,0.35);
      transform:translateY(-2px);
    }

    .footer{
      color:rgba(255,255,255,0.8);
      margin-top:30px;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="card">

    <h1>Leverage Experts E.A</h1>
    <p class="subtitle">Margaret Gitonga — Director / Lead Partner</p>

    <!-- <div class="qr-box">
      <img src="images/maggie.jpeg" alt="QR Code">
    </div> -->
    
              <div class="qr-box">
        <a href="https://margaretgitonga.github.io/LE_Margaret_Gitonga/" target="_blank">
          <img src="images/maggie.jpeg" alt="QR Code">
        </a>
      </div>

    <p class="tap-text">
      TAP TO OPEN WEBSITE
    </p>

    <a class="whatsapp-btn"
       href="https://wa.me/?text=Check out Margaret Gitonga's digital card: https://margaretgitonga.github.io/LE_Margaret_Gitonga/index.html"
       target="_blank">
      Share on WhatsApp 📱
    </a>

    <div class="icons">

      <a class="icon" href="https://margaretgitonga.github.io/LE_Margaret_Gitonga/" target="_blank">
        🌐
      </a>

      <a class="icon" href="tel:+254 722 301 118">
        📞
      </a>

      <a class="icon" href="mailto:margaret.gitonga@leverage-experts.com">
        ✉️
      </a>

    </div>

    <p class="footer">
      Scan or click the QR code to view full contact profile
    </p>

  </div>

</body>
</html>
