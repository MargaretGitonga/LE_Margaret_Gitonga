<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Margaret Gitonga - Leverage Experts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Margaret Gitonga - Director / Lead Partner (East Africa) at Leverage Experts E.A">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background-color: #0b1f5b;
    color: #0f172a;
}

/* ============ CARD SECTION ============ */
.card {
    max-width: 420px;
    margin: 30px auto;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    overflow: hidden;
}

.header {
    background-color: #0b1f5b;
    padding: 30px 20px;
    text-align: center;
}

.logo {
    width: 200px;
    height: auto;
    max-width: 100%;
}

.profile-wrapper {
    text-align: center;
    padding: 20px 0 10px;
}

.profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffffff;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
}

.content {
    padding: 20px 24px;
    text-align: center;
}

.name {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
    color: #0f172a;
}

.role {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 4px;
}

.company-name {
    color: #2563eb;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 18px;
}

.details { margin-top: 14px; }

.detail-box {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #f8fafc;
    padding: 14px 16px;
    border-radius: 12px;
    margin: 8px 0;
    text-align: left;
    border: 1.5px solid #e2e8f0;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
}

.detail-box:hover {
    background: #f1f5f9;
}

.icon { font-size: 20px; flex-shrink: 0; }

.text {
    font-size: 14px;
    color: #334155;
}

.label {
    font-size: 11px;
    color: #94a3b8;
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
}

.text-link {
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
}

.text-link:hover {
    text-decoration: underline;
}

.location-link {
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    width: 100%;
}

.location-link:hover {
    opacity: 0.85;
}

.location-link .map-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
}

@media (max-width: 480px) {
    .card { margin: 20px 10px; }
    .logo { width: 150px; }
    .profile-img { width: 80px; height: 80px; }
}
</style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="images/lev3.jpeg" alt="Leverage Experts" class="logo">
    </div>

    <div class="profile-wrapper">
        <img src="images/margaret.jpeg" class="profile-img" alt="Profile Photo">
    </div>

    <div class="content">
        <div class="name">Margaret Gitonga, <small>(BCom MBA)</small></div>
        <div class="role"><strong>Director / Lead Partner (East Africa)</strong></div>
        <div class="company-name">Leverage Experts E.A</div>
        <div class="role"><strong>Zurich | Frankfurt | Dubai | Nairobi</strong></div>

        <div class="details">
            <div class="detail-box">
                <div class="icon">📞</div>
                <div class="text">
                    <div class="label">Mobile</div>
                    <a href="tel:+254722301118" class="text-link">+254 722 301 118</a>
                </div>
            </div>
            <div class="detail-box">
                <div class="icon">✉️</div>
                <div class="text">
                    <div class="label">Email</div>
                    <a href="mailto:margaret.gitonga@leverage-experts.com" class="text-link">margaret.gitonga@leverage-experts.com</a>
                </div>
            </div>

            <a href="https://www.google.com/maps/search/?api=1&query=Park+Suites+4th+Floor+Nairobi"
               target="_blank" class="location-link">
                <div class="icon">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg"
                         alt="Map" class="map-icon">
                </div>
                <div class="text">
                    <div class="label">Location</div>
                    <div class="text-link">Park Suites 4th Floor, Nairobi</div>
                </div>
            </a>

            <div class="detail-box">
                <div class="icon">🏢</div>
                <div class="text">
                    <div class="label">Company</div>
                    <span class="text-link">Leverage Experts East Africa LTD</span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
